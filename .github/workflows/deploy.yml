name: Deploy to GitHub Pages

# Builds the Vite app and publishes dist/ to Pages.
# (Pages must be set to Source = "GitHub Actions" in repo Settings → Pages.)

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # @supabase/* require >=22; vite/rolldown require ^20.19 || >=22.12
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        env:
          # Pages serves this project from /BOM/, not the domain root
          VITE_BASE: /BOM/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
